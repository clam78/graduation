<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="outline" x="-20%" y="-20%" width="140%" height="140%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="1.2" result="expanded"/>
      <feFlood flood-color="white" result="color"/>
      <feComposite in="color" in2="expanded" operator="in" result="outline"/>
      <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#outline)">
    <!-- Cap body (cylinder) -->
    <path d="M12 17 L12 22 Q12 24 16 24 Q20 24 20 22 L20 17 Z" fill="#3D2C2C"/>
    <!-- Mortarboard top (diamond) -->
    <polygon points="16,8 27,13 16,18 5,13" fill="#3D2C2C"/>
    <!-- Subtle highlight on front face -->
    <polygon points="16,8 5,13 10.5,15.5 16,13" fill="rgba(255,255,255,0.12)"/>
    <!-- Tassel cord -->
    <line x1="27" y1="13" x2="27" y2="22" stroke="#EFA8BC" stroke-width="2" stroke-linecap="round"/>
    <!-- Tassel ball -->
    <circle cx="27" cy="24.5" r="2.2" fill="#EFA8BC"/>
  </g>
</svg>
